# vim:fileencoding=utf-8:foldmethod=marker

# BEGIN_KITTY_THEME
# Rosé Pine
include current-theme.conf
# END_KITTY_THEME


font_size 22


# BEGIN_KITTY_FONTS
font_family      family="IosevkaTerm Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

hide_window_decorations   titlebar-only
window_padding_width      15
background_opacity        1.0
remember_window_size      yes

cursor_shape block
cursor_trail 3
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2
cursor_trail_color #FFFFFF

# window
tab_bar_edge             top
tab_bar_style            powerline
tab_powerline_style      slanted

# macos
macos_quit_when_last_window_closed yes

# Ghostty-compatible Cmd mappings: send ESC + key, i.e. Meta/Alt sequences.
map cmd+1 send_text all \x1b1
map cmd+2 send_text all \x1b2
map cmd+3 send_text all \x1b3
map cmd+4 send_text all \x1b4
map cmd+5 send_text all \x1b5
map cmd+6 send_text all \x1b6
map cmd+7 send_text all \x1b7
map cmd+8 send_text all \x1b8
map cmd+9 send_text all \x1b9

map cmd+h send_text all \x1bh
map cmd+j send_text all \x1bj
map cmd+k send_text all \x1bk
map cmd+l send_text all \x1bl
map cmd+o send_text all \x1bo
