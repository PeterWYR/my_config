a vim:fileencoding=utf-8:foldmethod=marker

# BEGIN_KITTY_THEME
# Rosé Pine
include current-theme.conf
# END_KITTY_THEME


font_size 22


# BEGIN_KITTY_FONTS
font_family      family="IosevkaTerm Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

hide_window_decorations   titlebar-only
window_padding_width      15
background_opacity        1.0
remember_window_size      yes

cursor_shape block
cursor_trail 3
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2

# window
tab_bar_edge             top
tab_bar_style            powerline
# tab_bar_style            separator
# tab_separator " |"
tab_bar_min_tabs         2
tab_bar_margin_width     6
tab_bar_margin_height    4 0

# tab colors (Rosé Pine) — fade style fades the tab bg into the bar bg
tab_bar_background       #191724
active_tab_foreground    #191724
active_tab_background    #c4a7e7
active_tab_font_style    bold
inactive_tab_foreground  #6e6a86
inactive_tab_background  #1f1d2e
inactive_tab_font_style  italic
tab_title_template       " {index} {title} "

# split divider line color (Rosé Pine)
active_border_color   #c4a7e7
inactive_border_color #6e6a86

# macos
macos_quit_when_last_window_closed yes
macos_option_as_alt yes

map cmd+o send_text all \x1bo

# cmd+h/j/k/l: move focus between split windows
map cmd+h neighboring_window left
map cmd+j neighboring_window down
map cmd+k neighboring_window up
map cmd+l neighboring_window right

# layouts: use splits so new windows split the current one
enabled_layouts splits,stack

# cmd+enter: split automatically — wide panes split right, tall panes split down
map cmd+enter launch --location=split --cwd=current
# cmd+shift+enter: split the current window top/bottom (horizontal split)
map cmd+shift+enter launch --location=hsplit --cwd=current

# cmd+d: toggle fullscreen (keep keybinds consistent with ghostty)
map cmd+d toggle_fullscreen

# cmd+1..9: switch to tab by number (cmd+9 jumps to the last tab)
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab -1
