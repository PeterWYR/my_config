# ==========================================
# 1. 基础环境与路径 (保留原配置)
# ==========================================
set-environment -g TMUX_PLUGIN_MANAGER_PATH "${HOME}/.tmux/plugins"

# 让 tmux 更完整地传递 xterm 功能键/修饰键序列
set -g xterm-keys on
set -g default-terminal "tmux-256color"
set -as terminal-features ',xterm-256color:RGB'
set -as terminal-features ',tmux-256color:RGB'

# tmux 3.2+ 更推荐的：允许扩展键盘协议（对很多 C-Alt-键更稳）
set -g extended-keys on
set -as terminal-overrides ',*:extended-keys'
# ==========================================
# 2. 核心快捷键 (完全保留原配置)
# ==========================================
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# --- 窗口切换 ---
unbind -n C-n
bind-key n previous-window
bind-key m next-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# --- 面板移动 (ikjl) ---
bind -n M-k select-pane -U
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-l select-pane -R

# --- 面板分屏 ---
bind k split-window -v -b -c "#{pane_current_path}"
bind j split-window -v -c "#{pane_current_path}"
bind h split-window -h -b -c "#{pane_current_path}"
bind l split-window -h -c "#{pane_current_path}"

# --- 面板缩放 ---
bind -r K resize-pane -U 5
bind -r J resize-pane -D 5
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5

# --- 快速创建窗口 ---
bind-key -n M-o new-window -c "#{pane_current_path}"

# ==========================================
# 3. 基础设置 
# ==========================================
set -g base-index 1
set -g pane-base-index 1
set -g mouse on
set -g renumber-windows on
set -g default-terminal 'screen-256color'
set -ag terminal-overrides ',xterm-256color*:RGB'

# 移除 set -g allow-rename off，改为开启自动重命名
setw -g automatic-rename on   
set -g automatic-rename-format "#{pane_current_command}"

# ==========================================
# 4. Catppuccin Macchiato 主题状态栏
# ==========================================
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_current_text_color "#{@thm_blue}"
set -g @catppuccin_window_current_number_color "#{@thm_blue}"

# 窗口显示程序名称（而不是文件夹路径）
set -g @catppuccin_window_text " #{pane_current_command}"
set -g @catppuccin_window_current_text " #{pane_current_command}"

# 加载 catppuccin 主题
run "${HOME}/.tmux/plugins/catppuccin-tmux/catppuccin.tmux"

set -g pane-border-status off
set -g pane-border-style "fg=default,bg=default"
set -g pane-active-border-style "fg=default,bg=default"

set -g status-position bottom
set -g status-justify left

# ==========================================
# 4.1 胶囊风格状态栏
# ==========================================
# Session 图标（覆盖默认的 ）
set -g @catppuccin_session_icon "📺 "

# 使用 catppuccin 的 status 模块
set -g status-left "#{E:@catppuccin_status_session}"

# 右下角模块 - 胶囊样式
set -g status-right "#{E:@catppuccin_status_date_time}"

# 窗口分隔符
set -g window-status-separator ""

# 增加长度防止截断
set -g status-left-length 80
set -g status-right-length 50

# ==========================================
# 5. 插件管理
# ==========================================
# 注意：我注释掉了 dracula/tmux，因为我们已经手动实现了它的视觉效果
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
# set -g @plugin 'dracula/tmux' 

set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @tpm-install 'H'

# ==========================================
# 6. 程序图标映射
# ==========================================
