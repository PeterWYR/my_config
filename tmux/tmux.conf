# ==========================================
# 1. 基础环境与路径 (保留原配置)
# ==========================================
set-environment -g TMUX_PLUGIN_MANAGER_PATH "${HOME}/.tmux/plugins"

# 让 tmux 更完整地传递 xterm 功能键/修饰键序列
set -g xterm-keys on
set -g default-terminal "tmux-256color"
set -as terminal-features ',xterm-256color:RGB'
set -as terminal-features ',tmux-256color:RGB'

# tmux 3.2+ 更推荐的：允许扩展键盘协议（对很多 C-Alt-键更稳）
set -g extended-keys on
set -as terminal-overrides ',*:extended-keys'
# ==========================================
# 2. 核心快捷键 (完全保留原配置)
# ==========================================
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# --- 窗口切换 ---
unbind -n C-n
bind-key n previous-window
bind-key m next-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# --- 面板移动 (ijkl) ---
bind -n M-i select-pane -U
bind -n M-j select-pane -L
bind -n M-k select-pane -D
bind -n M-l select-pane -R

# --- 面板分屏 (prefix + ijkl) ---
bind i split-window -v -b -c "#{pane_current_path}"
bind k split-window -v -c "#{pane_current_path}"
bind j split-window -h -b -c "#{pane_current_path}"
bind l split-window -h -c "#{pane_current_path}"

# --- 面板缩放 (prefix + r 后再按 ijkl，避免覆盖分屏键) ---
bind r switch-client -T resize-pane
bind -r -T resize-pane i resize-pane -U 5
bind -r -T resize-pane j resize-pane -L 5
bind -r -T resize-pane k resize-pane -D 5
bind -r -T resize-pane l resize-pane -R 5

# --- 快速创建窗口 ---
bind-key -n M-o new-window -c "#{pane_current_path}"

# ==========================================
# 3. 基础设置 
# ==========================================
set -g base-index 1
set -g pane-base-index 1
set -g mouse on
set -g renumber-windows on
set -g default-terminal 'tmux-256color'
set -ag terminal-overrides ',xterm-256color*:RGB'

# 移除 set -g allow-rename off，改为开启自动重命名
setw -g automatic-rename on   
set -g automatic-rename-format "#{pane_current_command}"

# ==========================================
# 4. Tokyo Night 主题状态栏
# ==========================================
set -g @tokyonight_bg "#1a1b26"
set -g @tokyonight_bg_dark "#16161e"
set -g @tokyonight_bg_highlight "#292e42"
set -g @tokyonight_fg "#c0caf5"
set -g @tokyonight_fg_dark "#a9b1d6"
set -g @tokyonight_comment "#565f89"
set -g @tokyonight_blue "#7aa2f7"
set -g @tokyonight_cyan "#7dcfff"
set -g @tokyonight_green "#9ece6a"
set -g @tokyonight_magenta "#bb9af7"
set -g @tokyonight_yellow "#e0af68"
set -g @tokyonight_red "#f7768e"

set -g pane-border-status off
set -g pane-border-style "fg=#292e42,bg=default"
set -g pane-active-border-style "fg=#7aa2f7,bg=default"

set -g display-panes-colour "#7aa2f7"
set -g display-panes-active-colour "#bb9af7"
set -g message-style "fg=#c0caf5,bg=#292e42"
set -g message-command-style "fg=#c0caf5,bg=#292e42"
set -g mode-style "fg=#1a1b26,bg=#7aa2f7"

set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style "fg=#c0caf5,bg=#16161e"
set -g status-left-style "fg=#c0caf5,bg=#16161e"
set -g status-left "#[fg=#7aa2f7,bg=#16161e]#[fg=#1a1b26,bg=#7aa2f7,bold] 📺 #S #[fg=#7aa2f7,bg=#16161e] "
set -g status-right "#[fg=#565f89,bg=#16161e]#[fg=#a9b1d6,bg=#565f89] %Y-%m-%d #[fg=#565f89,bg=#7aa2f7]#[fg=#1a1b26,bg=#7aa2f7,bold] %H:%M #[fg=#7aa2f7,bg=#16161e]"

set -g window-status-format "#[fg=#565f89,bg=#16161e]#[fg=#1a1b26,bg=#565f89] #I #[fg=#a9b1d6,bg=#292e42]#{pane_current_command} #[fg=#292e42,bg=#16161e]"
set -g window-status-current-format "#[fg=#bb9af7,bg=#16161e]#[fg=#1a1b26,bg=#bb9af7,bold] #I #[fg=#1a1b26,bg=#bb9af7,bold]#{pane_current_command} #[fg=#bb9af7,bg=#16161e]"
set -g window-status-separator ""
set -g window-status-activity-style "fg=#e0af68,bg=#16161e"
set -g window-status-bell-style "fg=#1a1b26,bg=#f7768e,bold"

# 增加长度防止截断
set -g status-left-length 80
set -g status-right-length 50

# ==========================================
# 5. 插件管理
# ==========================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @tpm-install 'H'

# ==========================================
