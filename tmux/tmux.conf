# ==========================================
# 1. 基础环境与路径 (保留原配置)
# ==========================================
set-environment -g TMUX_PLUGIN_MANAGER_PATH "${HOME}/.tmux/plugins"

# 让 tmux 更完整地传递 xterm 功能键/修饰键序列
set -g xterm-keys on
set -g default-terminal "tmux-256color"
set -as terminal-features ',xterm-256color:RGB'
set -as terminal-features ',tmux-256color:RGB'

# tmux 3.2+ 更推荐的：允许扩展键盘协议（对很多 C-Alt-键更稳）
set -g extended-keys on
set -as terminal-overrides ',*:extended-keys'
# ==========================================
# 2. 核心快捷键 (完全保留原配置)
# ==========================================
unbind C-b
#set -g prefix C-x
#bind C-x send-prefix

# --- 窗口切换 ---
unbind -n C-n
bind-key n previous-window
bind-key m next-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# --- 面板移动 (hjkl) ---
bind -n M-k select-pane -U
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-l select-pane -R

# --- 面板分屏 (prefix + hjkl) ---
bind k split-window -v -b -c "#{pane_current_path}"
bind j split-window -v -c "#{pane_current_path}"
bind h split-window -h -b -c "#{pane_current_path}"
bind l split-window -h -c "#{pane_current_path}"

# --- 面板缩放 (prefix + r 后再按 hjkl，避免覆盖分屏键) ---
bind r switch-client -T resize-pane
bind -r -T resize-pane k resize-pane -U 5
bind -r -T resize-pane h resize-pane -L 5
bind -r -T resize-pane j resize-pane -D 5
bind -r -T resize-pane l resize-pane -R 5

# --- 快速创建窗口 ---
bind-key -n M-o new-window -c "#{pane_current_path}"

# ==========================================
# 3. 基础设置 
# ==========================================
set -g base-index 1
set -g pane-base-index 1
set -g mouse on
set -g renumber-windows on
set -g default-terminal 'tmux-256color'
set -ag terminal-overrides ',xterm-256color*:RGB'

# 移除 set -g allow-rename off，改为开启自动重命名
setw -g automatic-rename on   
set -g automatic-rename-format "#{pane_current_command}"

# ==========================================
# 4. Horizon 主题状态栏
# ==========================================
set -g @horizon_bg "#1C1E26"
set -g @horizon_bg_dark "#16161C"
set -g @horizon_bg_highlight "#2E303E"
set -g @horizon_fg "#BBBBBB"
set -g @horizon_fg_dark "#797B80"
set -g @horizon_comment "#54565C"
set -g @horizon_red "#E95678"
set -g @horizon_red_alt "#E9436D"
set -g @horizon_orange "#FAB38E"
set -g @horizon_yellow "#FAC29A"
set -g @horizon_green "#27D797"
set -g @horizon_cyan "#25B0BC"
set -g @horizon_purple "#B877DB"

set -g pane-border-status off
set -g pane-border-style "fg=#2E303E,bg=default"
set -g pane-active-border-style "fg=#E95678,bg=default"

set -g display-panes-colour "#E95678"
set -g display-panes-active-colour "#FAB38E"
set -g message-style "fg=#BBBBBB,bg=#2E303E"
set -g message-command-style "fg=#BBBBBB,bg=#2E303E"
set -g mode-style "fg=#1C1E26,bg=#E95678"

set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style "fg=#BBBBBB,bg=#16161C"
set -g status-left-style "fg=#BBBBBB,bg=#16161C"
set -g status-left "#[fg=#E95678,bg=#16161C]#[fg=#1C1E26,bg=#E95678,bold] 📺 #S #[fg=#E95678,bg=#16161C] "
set -g status-right "#[fg=#2E303E,bg=#16161C]#[fg=#BBBBBB,bg=#2E303E] %Y-%m-%d #[fg=#2E303E,bg=#FAB38E]#[fg=#1C1E26,bg=#FAB38E,bold] %H:%M #[fg=#FAB38E,bg=#16161C]"

set -g window-status-format "#[fg=#54565C,bg=#16161C]#[fg=#1C1E26,bg=#54565C] #I #[fg=#BBBBBB,bg=#2E303E]#{pane_current_command} #[fg=#2E303E,bg=#16161C]"
set -g window-status-current-format "#[fg=#E95678,bg=#16161C]#[fg=#1C1E26,bg=#E95678,bold] #I #[fg=#1C1E26,bg=#E95678,bold]#{pane_current_command} #[fg=#E95678,bg=#16161C]"
set -g window-status-separator ""
set -g window-status-activity-style "fg=#FAB38E,bg=#16161C"
set -g window-status-bell-style "fg=#1C1E26,bg=#F43E5C,bold"

# 增加长度防止截断
set -g status-left-length 80
set -g status-right-length 50

# ==========================================
# 5. 插件管理
# ==========================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @tpm-install 'H'

# ==========================================
# 6. 程序图标映射
# ==========================================
